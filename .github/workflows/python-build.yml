# This workflow runs on pull requests to the main branch and on published releases.
# It checks commit messages, builds the Python package, runs tests, and deploys to PyPI for releases.
name: PR and Python checks

on:
  pull_request:
    branches: ["main"]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  commitlint:
    name: PR Commit Messages Check
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    permissions:
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
      - uses: wagoid/commitlint-github-action@v6.2.1
        with:
          configFile: commitlint.config.mjs

  build:
    name: Python Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: ["windows-latest", "ubuntu-latest", "macos-latest"]
    env:
      SKIP: no-commit-to-branch
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -r requirements-all.txt pre-commit build
        shell: bash
      - name: Activate virtualenv
        # This repo has no pyproject.toml, so expose the .venv to later steps by
        # putting it on PATH. On Windows the venv layout is .venv/Scripts and
        # GITHUB_PATH needs a native path (cygpath), otherwise system hooks like
        # pylint can't find their executable.
        run: |
          if [ -d .venv/bin ]; then
            echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
            echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          else
            cygpath -w "$PWD/.venv/Scripts" >> "$GITHUB_PATH"
            cygpath -w "$PWD/.venv" | sed 's/^/VIRTUAL_ENV=/' >> "$GITHUB_ENV"
          fi
        shell: bash
      - name: Cache pre-commit environments
        if: github.event_name != 'release'
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit
        if: github.event_name != 'release'
        run: pre-commit run --show-diff-on-failure --color=always --all-files
        shell: bash
      - name: Build midea-local
        run: python -m build
        shell: bash
      - name: Test with pytest
        run: |
          python -m pytest --rootdir . --cov=midealocal --cov-report html --cov-report xml --junitxml=reports/junit/junit.xml ./tests/
          mv htmlcov reports/coverage
        shell: bash
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    name: Deploy Release to PyPI
    needs: [build]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/midea-local
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Build package
        run: |
          uv venv --python 3.14
          uv pip install build
          .venv/bin/python3 -m build
        shell: bash
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
